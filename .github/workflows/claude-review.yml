name: Claude PR Review

on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  claude:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ai-review')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Restore Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore tsbuildinfo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            apps/*/.tsbuildinfo
            packages/*/.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ github.event.pull_request.base.sha || 'main' }}
          restore-keys: tsbuildinfo-${{ runner.os }}-

      - name: Restore import-graph cache (if available)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .pr-review-cache/import-graph.json
          key: import-graph-${{ github.event.pull_request.base.sha || 'main' }}
          restore-keys: import-graph-

      - name: Build Claude review assets
        id: review_assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGED_FILES="$(gh pr view "$PR_NUMBER" --json changedFiles --jq '.changedFiles')"
          bun run scripts/pr-review/build-prompt.ts --pr "$PR_NUMBER" --changed-files "$CHANGED_FILES" > "$RUNNER_TEMP/claude-review-prompt.txt"
          bun run scripts/pr-review/build-prompt.ts --pr "$PR_NUMBER" --format allowed-tools > "$RUNNER_TEMP/claude-allowed-tools.txt"
          {
            echo 'prompt<<EOF'
            cat "$RUNNER_TEMP/claude-review-prompt.txt"
            echo EOF
            echo 'allowed_tools<<EOF'
            cat "$RUNNER_TEMP/claude-allowed-tools.txt"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude PR review
        id: claude
        uses: anthropics/claude-code-action@b1139cae6ebe959e68ced65d448a0a0a708e1108 # v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: false
          claude_args: |
            --allowedTools "${{ steps.review_assets.outputs.allowed_tools }}"
            --json-schema '{"type":"object","properties":{"summary_comment":{"type":"string"}},"required":["summary_comment"]}'
          prompt: ${{ steps.review_assets.outputs.prompt }}

      - name: Upsert Claude summary comment
        if: ${{ always() && steps.claude.outputs.structured_output != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ env.PR_NUMBER }}
          REPO: ${{ github.repository }}
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
        run: |
          SUMMARY_COMMENT="$(jq -r '.summary_comment' <<<"$STRUCTURED_OUTPUT")"
          if [ -z "$SUMMARY_COMMENT" ] || [ "$SUMMARY_COMMENT" = "null" ]; then
            echo "No summary comment returned."
            exit 0
          fi

          COMMENT_BODY="<!-- claude-pr-review-summary -->"$'\n'"$SUMMARY_COMMENT"
          COMMENT_ID="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq '.[] | select(.body | contains("<!-- claude-pr-review-summary -->")) | .id' | tail -n1)"
          if [ -z "$COMMENT_ID" ]; then
            COMMENT_ID="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("## Summary")) and (.body | contains("## Confidence"))) | .id' | tail -n1)"
          fi

          if [ -n "$COMMENT_ID" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$COMMENT_ID" -f body="$COMMENT_BODY" >/dev/null
          else
            gh api --method POST "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$COMMENT_BODY" >/dev/null
          fi
