name: Release Desktop (macOS)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.4)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual reruns, e.g. v0.0.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      # When MAC_CSC_LINK is set, electron-builder will sign the DMG.
      # When absent, CSC_IDENTITY_AUTO_DISCOVERY=false produces an unsigned build.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::RELEASE_TAG is required."
            exit 1
          fi

          if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${RELEASE_TAG} (expected vX.Y.Z)"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Bun
        run: |
          curl -fsSL https://bun.com/install | bash -s -- bun-v1.3.5
          echo "${HOME}/.bun/bin" >> "$GITHUB_PATH"
          "${HOME}/.bun/bin/bun" --version

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-1.3.5-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.5-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --cache-dir .bun-cache

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build client renderer
        working-directory: apps/client
        env:
          SHARKORD_VERSION: ${{ steps.version.outputs.version }}
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Package macOS DMG
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          [ -z "$CSC_LINK" ] && unset CSC_LINK
          [ -z "$CSC_KEY_PASSWORD" ] && unset CSC_KEY_PASSWORD
          bunx electron-builder --mac dmg --publish never

      - name: Upload desktop assets to GitHub release
        run: |
          shopt -s nullglob
          assets=(
            apps/desktop/build/out/*.dmg
            apps/desktop/build/out/*.dmg.blockmap
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No macOS desktop release assets found to upload."
            ls -la apps/desktop/build/out || true
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
