name: Release Desktop (macOS)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.4)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual reruns, e.g. v0.0.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Validate inputs
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::RELEASE_TAG is required."
            exit 1
          fi

          if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${RELEASE_TAG} (expected vX.Y.Z)"
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build client renderer
        working-directory: apps/client
        env:
          SHARKORD_VERSION: ${{ steps.version.outputs.version }}
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Produce unpackaged macOS app (no signing)
        working-directory: apps/desktop
        run: |
          bunx electron-builder --mac dmg --dir --publish never

      - name: Upload unpackaged macOS app to next job
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mac-unpacked-${{ steps.version.outputs.version }}
          path: apps/desktop/build/out/**
          if-no-files-found: error
          retention-days: 3

  sign-and-upload:
    needs: build
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies (no postinstall scripts)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ env.RELEASE_VERSION }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Download unpackaged macOS app from build job
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mac-unpacked-${{ env.RELEASE_VERSION }}
          path: apps/desktop/_artifact

      - name: Package macOS DMG
        working-directory: apps/desktop
        run: |
          [ -z "$CSC_LINK" ] && unset CSC_LINK
          [ -z "$CSC_KEY_PASSWORD" ] && unset CSC_KEY_PASSWORD

          prepackaged_app="$(find _artifact -maxdepth 6 -type d -name '*.app' -print -quit)"
          if [ -z "$prepackaged_app" ]; then
            echo "::error::No prepackaged macOS app bundle found in downloaded artifact."
            find _artifact -maxdepth 4 -print
            exit 1
          fi

          bunx electron-builder --mac dmg --prepackaged "$prepackaged_app" --publish never

      - name: Upload desktop assets to GitHub release
        run: |
          shopt -s nullglob
          assets=(
            apps/desktop/build/out/*.dmg
            apps/desktop/build/out/*.dmg.blockmap
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No macOS desktop release assets found to upload."
            ls -la apps/desktop/build/out || true
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
