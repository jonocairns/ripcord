name: Release Desktop (macOS)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.4)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (defaults to tag)"
        required: false
        type: string
        default: ""
      version:
        description: "package.json version to stamp (defaults to tag with leading v stripped)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual reruns, e.g. v0.0.4)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (defaults to tag)"
        required: false
        type: string
        default: ""
      version:
        description: "package.json version to stamp (defaults to tag with leading v stripped)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_REF: ${{ inputs.ref }}
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Resolve inputs and validate
        id: resolve
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::RELEASE_TAG is required."
            exit 1
          fi

          ref="${RELEASE_REF:-${RELEASE_TAG}}"
          version="${RELEASE_VERSION:-${RELEASE_TAG#v}}"

          if [ "${RELEASE_PRERELEASE}" != "true" ]; then
            if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag format: ${RELEASE_TAG} (expected vX.Y.Z)"
              exit 1
            fi
          fi

          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build client renderer
        working-directory: apps/client
        env:
          SHARKORD_VERSION: ${{ steps.resolve.outputs.version }}
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ steps.resolve.outputs.version }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Produce unpackaged macOS app (no signing)
        working-directory: apps/desktop
        run: |
          bunx electron-builder --mac dmg --dir --publish never

      - name: Upload unpackaged macOS app to next job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mac-unpacked-${{ steps.resolve.outputs.version }}
          path: apps/desktop/build/out/**
          if-no-files-found: error
          retention-days: 3

  sign-and-upload:
    needs: build
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_REF: ${{ needs.build.outputs.ref }}
      RELEASE_VERSION: ${{ needs.build.outputs.version }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies (no postinstall scripts)
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ env.RELEASE_VERSION }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Download unpackaged macOS app from build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mac-unpacked-${{ env.RELEASE_VERSION }}
          path: apps/desktop/_artifact

      - name: Package macOS DMG
        working-directory: apps/desktop
        run: |
          [ -z "$CSC_LINK" ] && unset CSC_LINK
          [ -z "$CSC_KEY_PASSWORD" ] && unset CSC_KEY_PASSWORD

          prepackaged_app="$(find _artifact -maxdepth 6 -type d -name '*.app' -print -quit)"
          if [ -z "$prepackaged_app" ]; then
            echo "::error::No prepackaged macOS app bundle found in downloaded artifact."
            find _artifact -maxdepth 4 -print
            exit 1
          fi

          bunx electron-builder --mac dmg --prepackaged "$prepackaged_app" --publish never

      - name: Upload desktop assets to GitHub release
        run: |
          shopt -s nullglob
          assets=(
            apps/desktop/build/out/*.dmg
            apps/desktop/build/out/*.dmg.blockmap
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No macOS desktop release assets found to upload."
            ls -la apps/desktop/build/out || true
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
