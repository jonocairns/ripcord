name: Release Desktop (Windows)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.4)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual reruns, e.g. v0.0.4)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Validate inputs and signing secrets
        shell: bash
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::RELEASE_TAG is required."
            exit 1
          fi

          if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag format: ${RELEASE_TAG} (expected vX.Y.Z)"
            exit 1
          fi

          if [ -z "${CSC_LINK}" ] || [ -z "${CSC_KEY_PASSWORD}" ]; then
            echo "::error::Windows signing secrets are missing."
            echo "Set WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD in repository secrets."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Bun
        shell: pwsh
        run: |
          iex "& {$(irm https://bun.com/install.ps1)} -Version 1.3.5"
          "$env:USERPROFILE\.bun\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.bun\bin\bun.exe" --version

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: .bun-cache
          key: ${{ runner.os }}-bun-1.3.5-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.5-
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile --cache-dir .bun-cache

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build client renderer
        working-directory: apps/client
        env:
          SHARKORD_VERSION: ${{ steps.version.outputs.version }}
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $packageJsonPath = "package.json"
          $packageJson = Get-Content $packageJsonPath -Raw | ConvertFrom-Json
          $packageJson.version = "${{ steps.version.outputs.version }}"
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content $packageJsonPath

      - name: Package signed Windows installer and updater metadata
        working-directory: apps/desktop
        run: bunx electron-builder --win nsis --x64 --publish never

      - name: Validate updater metadata
        working-directory: apps/desktop
        shell: bash
        run: |
          set -euo pipefail

          metadata_file="$(ls build/out/latest*.yml 2>/dev/null | head -n1 || true)"
          if [ -z "${metadata_file}" ]; then
            echo "No latest*.yml updater metadata found in apps/desktop/build/out"
            ls -la build/out || true
            exit 1
          fi

          installer_path="$(sed -n 's/^path:[[:space:]]*//p' "${metadata_file}" | tr -d '\r' | head -n1)"
          installer_path="${installer_path#\"}"
          installer_path="${installer_path%\"}"

          if [ -z "${installer_path}" ]; then
            echo "Could not parse installer path from ${metadata_file}"
            sed -n '1,120p' "${metadata_file}" || true
            exit 1
          fi

          if [ ! -f "build/out/${installer_path}" ]; then
            echo "Updater metadata points to missing installer: build/out/${installer_path}"
            ls -la build/out || true
            sed -n '1,120p' "${metadata_file}" || true
            exit 1
          fi

          echo "Validated updater metadata installer path: ${installer_path}"

      - name: Upload desktop assets to GitHub release
        shell: bash
        run: |
          shopt -s nullglob
          assets=(
            apps/desktop/build/out/*.exe
            apps/desktop/build/out/*.blockmap
            apps/desktop/build/out/latest*.yml
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No desktop release assets found to upload."
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
