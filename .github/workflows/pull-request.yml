name: Pull Request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Quality + Server Tests
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Run lint
        run: bun run lint

      - name: Run knip
        run: bun run knip

      - name: Run server tests
        working-directory: apps/server
        run: bun test

      - name: Run client tests
        working-directory: apps/client
        run: bun test

      - name: Run desktop tests
        working-directory: apps/desktop
        run: bun test

  sidecar-windows:
    name: Desktop Build + Sidecar (Windows)
    runs-on: windows-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build and test Rust sidecar (release profile)
        working-directory: apps/desktop/sidecar
        run: cargo test --release --locked

      - name: Build client renderer
        working-directory: apps/client
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

  sidecar-macos:
    name: Desktop Build + Sidecar (macOS)
    runs-on: macos-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build and test Rust sidecar (release profile)
        working-directory: apps/desktop/sidecar
        run: cargo test --release --locked

      - name: Build client renderer
        working-directory: apps/client
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

  sidecar-linux:
    name: Desktop Build + Sidecar (Linux)
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build and test Rust sidecar (release profile)
        working-directory: apps/desktop/sidecar
        run: cargo test --release --locked

      - name: Build client renderer
        working-directory: apps/client
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer
