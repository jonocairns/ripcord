name: Pull Request

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Quality + Server Tests
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run check-types

      - name: Run lint
        run: bun run lint

      - name: Run knip
        run: bun run knip

      - name: Run server tests
        working-directory: apps/server
        run: bun test

  sidecar-windows:
    name: Desktop Build + Sidecar (Windows)
    runs-on: windows-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build and test Rust sidecar (release profile)
        working-directory: apps/desktop/sidecar
        run: cargo test --release --locked

      - name: Build client renderer
        working-directory: apps/client
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

