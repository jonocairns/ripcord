name: Pull Request

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Quality + Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check types
        run: bun run check-types

      - name: Run lint
        run: bun run lint

      - name: Build client
        working-directory: apps/client
        run: bun run build

      - name: Run server tests
        working-directory: apps/server
        run: bun test

  sidecar-windows:
    name: Desktop Build + Sidecar (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Build and test Rust sidecar (debug profile)
        working-directory: apps/desktop/sidecar
        run: cargo test --locked

      - name: Build client renderer
        working-directory: apps/client
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer
