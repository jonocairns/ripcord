name: Release Desktop (Linux)

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.4)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (defaults to tag)"
        required: false
        type: string
        default: ""
      version:
        description: "package.json version to stamp (defaults to tag with leading v stripped)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual reruns, e.g. v0.0.4)"
        required: true
        type: string
      ref:
        description: "Git ref to checkout (defaults to tag)"
        required: false
        type: string
        default: ""
      version:
        description: "package.json version to stamp (defaults to tag with leading v stripped)"
        required: false
        type: string
        default: ""
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_REF: ${{ inputs.ref }}
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Resolve inputs and validate
        id: resolve
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "::error::RELEASE_TAG is required."
            exit 1
          fi

          ref="${RELEASE_REF:-${RELEASE_TAG}}"
          version="${RELEASE_VERSION:-${RELEASE_TAG#v}}"

          if [ "${RELEASE_PRERELEASE}" != "true" ]; then
            if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid tag format: ${RELEASE_TAG} (expected vX.Y.Z)"
              exit 1
            fi
          fi

          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ steps.resolve.outputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: apps/desktop/sidecar -> target

      - name: Install AppImage dependencies
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build client renderer
        working-directory: apps/client
        env:
          SHARKORD_VERSION: ${{ steps.resolve.outputs.version }}
        run: bun run build

      - name: Build desktop renderer and main process
        working-directory: apps/desktop
        run: |
          bun run build:sidecar
          bun run build:main
          bun run prepare:renderer

      - name: Set desktop package version for release build
        working-directory: apps/desktop
        run: |
          jq --arg v "${{ steps.resolve.outputs.version }}" '.version = $v' package.json \
            > package.json.tmp && mv package.json.tmp package.json

      - name: Package Linux AppImage
        working-directory: apps/desktop
        run: bunx electron-builder --linux AppImage --publish never

      - name: Upload desktop assets to GitHub release
        run: |
          shopt -s nullglob
          assets=(
            apps/desktop/build/out/*.AppImage
            apps/desktop/build/out/*.AppImage.blockmap
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No Linux desktop release assets found to upload."
            ls -la apps/desktop/build/out || true
            exit 1
          fi

          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes ""
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
