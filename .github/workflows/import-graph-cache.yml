name: Import Graph Cache

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: import-graph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build import graph
        run: bun run scripts/pr-review/build-import-graph.ts

      - name: Save import-graph cache
        uses: actions/cache/save@v4
        with:
          path: .pr-review-cache/import-graph.json
          key: import-graph-${{ github.sha }}

      - name: Upload import-graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: import-graph
          path: .pr-review-cache/import-graph.json
          retention-days: 7
