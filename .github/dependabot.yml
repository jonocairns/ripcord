version: 2
updates:
  # Keep all third-party GitHub Actions pinned to commit SHAs but bumped to
  # latest tagged version. Mitigates supply-chain risk from a compromised
  # action releasing a malicious version under an existing tag.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # npm dependencies for the workspace root (covers all apps/* and packages/*).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
    groups:
      production-deps:
        dependency-type: production
        update-types: [patch, minor]
      dev-deps:
        dependency-type: development
        update-types: [patch, minor]

  # Cargo dependencies for the desktop sidecar (Rust).
  - package-ecosystem: cargo
    directory: /apps/desktop/sidecar
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      cargo:
        patterns: ["*"]
        update-types: [patch, minor]
